# 02-workers.yml — join worker nodes to the Kubernetes cluster
#
# Prerequisites:
#   - 01-control-plane.yml must have run successfully
#   - /tmp/k8s_join_command.sh must exist on the Ansible controller
---
- name: Join Kubernetes worker nodes to the cluster
  hosts: workers
  become: true

  tasks:

    - name: Check if node is already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: already_joined

    - name: Read join command from controller
      set_fact:
        join_command: "{{ lookup('file', '/tmp/k8s_join_command.sh') | trim }}"
      when: not already_joined.stat.exists

    - name: Join the cluster
      command: "{{ join_command }}"
      when: not already_joined.stat.exists

    - name: Node already joined — skip
      debug:
        msg: "{{ inventory_hostname }} is already part of the cluster."
      when: already_joined.stat.exists


# ── Verify from the control plane ─────────────────────────────────────────────
- name: Verify all nodes are Ready
  hosts: control_plane[0]
  become: false

  tasks:

    - name: Wait for all nodes to reach Ready state
      command: kubectl get nodes
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: nodes_output
      until: nodes_output.stdout_lines | select('search', 'NotReady') | list | length == 0
      retries: 20
      delay: 15
      changed_when: false

    - name: Print final node status
      debug:
        msg: "{{ nodes_output.stdout_lines }}"
