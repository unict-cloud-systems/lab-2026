name: Destroy K8s Cluster

on:
  workflow_dispatch:   # manual trigger only — never automatic

jobs:
  destroy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key pair
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > terraform/id_ed25519
          echo "${{ secrets.SSH_PUBLIC_KEY }}"  > terraform/id_ed25519.pub
          chmod 600 terraform/id_ed25519

      - name: tofu init
        run: tofu -chdir=terraform init -reconfigure -backend-config="path=${HOME}/k8s-terraform.tfstate"

      - name: tofu destroy
        run: tofu -chdir=terraform destroy -auto-approve

      - name: Clean up host runner state
        run: |
          rm -f ~/k8s-config
          rm -f ~/k8s-hosts.ini
          rm -f /tmp/k8s_join_command.sh
          echo "Cluster destroyed and state cleaned up."
