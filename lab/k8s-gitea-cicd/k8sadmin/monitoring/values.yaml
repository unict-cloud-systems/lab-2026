# kube-prometheus-stack values override
# Used with: helm upgrade --install kube-prom-stack prometheus-community/kube-prometheus-stack \
#              --namespace monitoring -f values.yaml

grafana:
  adminPassword: "admin"
  service:
    type: NodePort
    nodePort: 32000

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

nodeExporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
